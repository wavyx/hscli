name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'website/**'
      - 'src/commands/**'
      - 'scripts/gen-commands.mjs'
      - 'scripts/build-docs-content.mjs'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Build the oclif manifest, then regenerate the canonical command reference.
      - run: npm ci
      - run: npm run build
      - run: npm run docs:commands

      # Build the Starlight site (its build step syncs docs/ -> content, then astro build).
      - run: npm ci
        working-directory: website
      - run: npm run build
        working-directory: website

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
